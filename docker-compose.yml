version: "3.8"

services:
  mallbase:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        VITE_GLOB_API_URL: ${VITE_GLOB_API_URL:-/api}
    container_name: mallbase
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - backend_runtime:/app/runtime
      - backend_uploads:/app/public/uploads

volumes:
  backend_runtime:
  backend_uploads:
