# ==========================================
# 前端一次性打包：后台前端资源同步到 backend/public/admin
#
# 用法：
#   docker compose -f docker-compose.frontend-build.yml up --build --force-recreate frontend-build
# ==========================================

name: ${MALLBASE_COMPOSE_PROJECT_NAME:-mallbase}

services:
  frontend-build:
    build:
      context: .
      dockerfile: deploy/docker/web/Dockerfile
      target: admin-builder
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-frontend-build
    working_dir: /build/admin
    volumes:
      - ./backend/public/admin:/dist
    command:
      - sh
      - -c
      - rm -rf /dist/* && cp -R apps/web-antd/dist/. /dist/
    restart: "no"
