name: Docker Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Backend
    runs-on: ubuntu-latest
    env:
      PHP_CACHE_DRIVER: file
      PHP_QUEUE_CONNECTION: sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, mbstring, pdo_mysql, redis, swoole
          coverage: none

      - name: Validate composer
        run: composer validate
        working-directory: backend

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: backend

      - name: PHP syntax check
        run: find app config mall_base public route tests -name '*.php' -print0 | xargs -0 -n1 php -l
        working-directory: backend

      - name: Run tests
        run: composer test
        working-directory: backend

  publish:
    name: Build and Push Backend Image
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || 'mallbase-backend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker Hub configuration
        id: dockerhub
        env:
          DOCKERHUB_LOGIN_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_LOGIN_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ] || [ -z "$DOCKERHUB_LOGIN_USERNAME" ] || [ -z "$DOCKERHUB_LOGIN_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Docker Hub publish skipped. Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.dockerhub.outputs.configured == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Build and push
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
