name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      PHP_CACHE_DRIVER: file
      PHP_QUEUE_CONNECTION: sync

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, mbstring, pdo_mysql, redis, swoole
          coverage: none

      - name: Validate composer
        run: composer validate
        working-directory: backend

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: backend

      - name: PHP syntax check
        run: find app config mall_base public route tests -name '*.php' -print0 | xargs -0 -n1 php -l
        working-directory: backend

      - name: Docker healthcheck syntax check
        run: php -l deploy/docker/backend-healthcheck.php

      - name: Run tests
        run: composer test
        working-directory: backend

  admin:
    name: Admin Check and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/admin/.node-version
          cache: pnpm
          cache-dependency-path: frontend/admin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend/admin

      - name: Run Admin unit tests
        run: pnpm run test:unit
        working-directory: frontend/admin

      - name: Run Admin UI contract tests
        run: pnpm run test:contracts
        working-directory: frontend/admin

      - name: Typecheck
        run: pnpm --filter @vben/web-antd run typecheck
        working-directory: frontend/admin

      - name: Build Admin
        run: pnpm run build:antd
        working-directory: frontend/admin

      - name: Verify Admin artifact
        run: test -f apps/web-antd/dist/index.html
        working-directory: frontend/admin

  uniapp:
    name: UniApp Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/uniapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/uniapp

      - name: Run UniApp tests
        run: npm test
        working-directory: frontend/uniapp

      - name: Build H5
        run: npm run build:h5
        working-directory: frontend/uniapp

      - name: Verify H5 artifact
        run: test -f dist/build/h5/index.html
        working-directory: frontend/uniapp

      - name: Build WeChat Mini Program
        run: npm run build:mp-weixin
        working-directory: frontend/uniapp
        env:
          VITE_UNIAPP_BASE_URL: https://example.com

      - name: Prepare WeChat Mini Program test artifact
        run: npm run prepare:mp-weixin-release
        working-directory: frontend/uniapp
        env:
          UNIAPP_WEIXIN_APPID: wx1234567890abcdef
          VITE_UNIAPP_BASE_URL: https://example.com

      - name: Verify WeChat Mini Program artifact
        run: |
          test -f dist/build/mp-weixin/app.json
          node -e "const config = require('./dist/build/mp-weixin/project.config.json'); if (config.appid !== 'wx1234567890abcdef') process.exit(1)"
        working-directory: frontend/uniapp

  full-stack-image:
    name: Full Stack Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shell scripts
        run: >-
          sh -n
          deploy/docker/ensure-env.sh
          deploy/docker/docker-entrypoint.sh
          deploy/docker/prepare-backend-volumes.sh
          deploy/docker/mysql-entrypoint.sh
          deploy/docker/redis-entrypoint.sh
          deploy/docker/check-db-auth.sh
          deploy/docker/rotate-db-password.sh
          deploy/docker/host-preflight.sh
          deploy/docker/tests/host-preflight-test.sh
          deploy/release/build-full-release.sh
          deploy/release/tests/build-full-release-test.sh

      - name: Validate Compose files
        run: |
          cp deploy/docker/.example.env .env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.dev.yml config --quiet
          docker compose -f docker-compose.full.yml config --quiet
          docker compose -f docker-compose.frontend-build.yml config --quiet
          docker compose -f docker-compose.uniapp-build.yml config --quiet

      - name: Verify legacy Backend config volume migration
        run: |
          prefix=mallbase-volume-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          for name in runtime uploads cert config bootstrap demo public-storage upgrade; do
            docker volume create "${prefix}-${name}"
          done
          cleanup() {
            for name in runtime uploads cert config bootstrap demo public-storage upgrade; do
              docker volume rm -f "${prefix}-${name}" >/dev/null
            done
          }
          trap cleanup EXIT
          docker run --rm -v "${prefix}-config:/config" alpine:3.24.1 \
            sh -c 'printf "JWT_SECRET=legacy-secret\nINSTALL_RUNTIME_MARKER=preserved\n" > /config/.env; chmod 600 /config/.env'
          docker run --rm \
            -v "${prefix}-runtime:/runtime" \
            -v "${prefix}-uploads:/uploads" \
            -v "${prefix}-cert:/cert" \
            -v "${prefix}-config:/config" \
            -v "${prefix}-bootstrap:/bootstrap:ro" \
            -v "${prefix}-demo:/demo" \
            -v "${prefix}-public-storage:/public-storage" \
            -v "${prefix}-upgrade:/upgrade" \
            -v "$PWD/deploy/docker/prepare-backend-volumes.sh:/prepare-backend-volumes.sh:ro" \
            alpine:3.24.1 sh /prepare-backend-volumes.sh
          docker run --rm -v "${prefix}-config:/config:ro" alpine:3.24.1 sh -c \
            'test ! -e /config/.env && grep -q "^INSTALL_RUNTIME_MARKER=preserved$" /config/backend.env && test "$(stat -c %u /config/backend.env)" = 10000 && test "$(stat -c %a /config/backend.env)" = 600'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Web image
        run: docker buildx build --load --file deploy/docker/web/Dockerfile --tag mallbase-web:test .

      - name: Smoke test Web image
        run: |
          volume=mallbase-web-uploads-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          docker volume create "$volume"
          docker run --rm -v "$volume:/uploads" alpine:3.24.1 \
            sh -c 'printf "upload-smoke\n" > /uploads/smoke.txt; printf "blocked\n" > /uploads/smoke.php'
          docker run -d --name mallbase-web-test \
            -v "$volume:/srv/mallbase-uploads:ro" \
            mallbase-web:test
          trap 'docker logs mallbase-web-test; docker rm -f mallbase-web-test; docker volume rm -f "$volume"' EXIT
          for attempt in $(seq 1 20); do
            if docker exec mallbase-web-test wget -q -O /dev/null http://127.0.0.1:8080/healthz; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              exit 1
            fi
            sleep 1
          done
          docker exec mallbase-web-test test -s /usr/share/nginx/html/admin/index.html
          docker exec mallbase-web-test test -s /usr/share/nginx/html/client/index.html
          docker exec mallbase-web-test sh -c \
            'wget -q -O - http://127.0.0.1:8080/uploads/smoke.txt | grep -q "^upload-smoke$"'
          if docker exec mallbase-web-test wget -q -O /dev/null http://127.0.0.1:8080/uploads/smoke.php; then
            echo "Executable upload was served unexpectedly" >&2
            exit 1
          fi

      - name: Build Backend image
        run: docker buildx build --load --file deploy/docker/Dockerfile --tag mallbase-backend:test .

      - name: Verify persistent Backend runtime config
        run: |
          volume=mallbase-backend-config-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          docker volume create "$volume"
          trap 'docker volume rm -f "$volume"' EXIT
          docker run --rm -v "$volume:/config" alpine:3.24.1 chown 10000:10000 /config
          docker run --rm \
            -v "$volume:/app/.mallbase-env" \
            mallbase-backend:test \
            sh -c 'test -L /app/.env; sed -i "s/^REDIS_PASSWORD=.*/REDIS_PASSWORD=old-password/; s/^QUEUE_REDIS_PASSWORD=.*/QUEUE_REDIS_PASSWORD=old-password/" /app/.mallbase-env/backend.env; printf "INSTALL_RUNTIME_MARKER=ci-persisted\n" >> /app/.mallbase-env/backend.env'
          docker run --rm \
            -e REDIS_PASSWORD= \
            -e QUEUE_REDIS_USE_CACHE_AUTH=true \
            -v "$volume:/app/.mallbase-env" \
            mallbase-backend:test \
            sh -c 'test -L /app/.env && grep -q "^INSTALL_RUNTIME_MARKER=ci-persisted$" /app/.env && grep -q "^REDIS_PASSWORD=$" /app/.env && grep -q "^QUEUE_REDIS_PASSWORD=$" /app/.env'
          docker run --rm mallbase-backend:test \
            php -r 'exit(ini_get("upload_max_filesize") === "220M" && ini_get("post_max_size") === "240M" ? 0 : 1);'
