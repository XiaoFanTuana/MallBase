name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, mbstring, pdo_mysql, redis
          coverage: none

      - name: Validate composer
        run: composer validate --strict
        working-directory: backend

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: backend

      - name: PHP syntax check
        run: find app config mall_base route tests -name '*.php' -print0 | xargs -0 -n1 php -l
        working-directory: backend

      - name: Run tests
        run: composer test
        working-directory: backend

  admin:
    name: Admin Check and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/admin/.node-version
          cache: pnpm
          cache-dependency-path: frontend/admin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend/admin

      - name: Typecheck (advisory)
        continue-on-error: true
        run: pnpm run check:type
        working-directory: frontend/admin

      - name: Build Admin
        run: pnpm run build:antd
        working-directory: frontend/admin

      - name: Verify Admin artifact
        run: test -f apps/web-antd/dist/index.html
        working-directory: frontend/admin

  uniapp:
    name: UniApp Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/uniapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/uniapp

      - name: Build H5
        run: npm run build:h5
        working-directory: frontend/uniapp

      - name: Verify H5 artifact
        run: test -f dist/build/h5/index.html
        working-directory: frontend/uniapp

      - name: Build WeChat Mini Program
        run: npm run build:mp-weixin
        working-directory: frontend/uniapp
        env:
          VITE_UNIAPP_BASE_URL: https://example.com

      - name: Prepare WeChat Mini Program test artifact
        run: npm run prepare:mp-weixin-release
        working-directory: frontend/uniapp
        env:
          UNIAPP_WEIXIN_APPID: wx1234567890abcdef
          VITE_UNIAPP_BASE_URL: https://example.com

      - name: Verify WeChat Mini Program artifact
        run: |
          test -f dist/build/mp-weixin/app.json
          node -e "const config = require('./dist/build/mp-weixin/project.config.json'); if (config.appid !== 'wx1234567890abcdef') process.exit(1)"
        working-directory: frontend/uniapp
