# ==========================================
# MallBase Nginx 配置示例
# 适用于：手动安装 / Docker 生产环境
#
# 使用方法：
#   1. 复制到 /etc/nginx/sites-available/mallbase.conf
#   2. ln -s /etc/nginx/sites-available/mallbase.conf /etc/nginx/sites-enabled/
#   3. 修改 server_name 和路径
#   4. nginx -t && systemctl reload nginx
# ==========================================

# --- HTTP（自动跳转 HTTPS）---
# 如果不需要 SSL，删除此 server 块和下方 listen 443 的相关配置
server {
    listen 80;
    server_name mall.example.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name mall.example.com;

    # --- SSL 证书（按实际路径修改）---
    ssl_certificate     /etc/nginx/ssl/mall.example.com.pem;
    ssl_certificate_key /etc/nginx/ssl/mall.example.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Gzip 压缩 ---
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    # --- 客户端 H5 静态文件 ---
    # UniApp H5 构建产物放在此目录：/var/www/mallbase/client/
    root /var/www/mallbase/client;
    index index.html;

    # --- 后端 API（反向代理到 Swoole）---
    location = /client/api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    location ^~ /client/api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # --- 后台前端静态文件 ---
    # Admin 构建产物放在此目录：/var/www/mallbase/admin/
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        alias /var/www/mallbase/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location ^~ /admin/api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # --- 安装向导 ---
    location /install {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 上传文件 ---
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8080;
    }

    # --- H5 静态资源长缓存 ---
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- 根路径 → 客户端 H5 ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}

