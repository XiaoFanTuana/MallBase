# ==========================================
# 生产环境：双容器方案（Nginx + Swoole）
# 用法: docker compose -f docker-compose.prod.yml up -d --build
# ==========================================

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend/Dockerfile
    container_name: mallbase-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      APP_DEBUG: ${APP_DEBUG:-false}
      CRON_ENABLE: ${CRON_ENABLE:-false}
      DB_TYPE: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_NAME: ${DB_NAME:-mallbase}
      DB_USER: ${DB_USER:-mallbase}
      DB_PASS: ${DB_PASS:-mallbase123}
      DB_PORT: ${DB_PORT:-3306}
      DB_CHARSET: utf8mb4
      CACHE_DRIVER: redis
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-0}
      SWOOLE_HTTP_HOST: 0.0.0.0
      SWOOLE_HTTP_PORT: 8080
      SWOOLE_WORKER_NUM: ${SWOOLE_WORKER_NUM:-0}
      SWOOLE_MAX_REQUEST: 2000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
      CORS_ALLOW_HEADERS: Authorization,Content-Type,X-Requested-With
      LOG_SINGLE: "false"
      LOG_MAX_FILES: 30
      TZ: Asia/Shanghai
    volumes:
      - backend_runtime:/app/runtime
      - backend_uploads:/app/public/uploads

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend/Dockerfile
      args:
        VITE_GLOB_API_URL: ${VITE_GLOB_API_URL:-/api}
    container_name: mallbase-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  backend_runtime:
  backend_uploads:
